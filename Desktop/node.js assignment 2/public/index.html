<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Node Rest api assignment</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
            line-height: 1.6;
        }

        .section {
            margin-bottom: 40px;
            border: 1px solid #ccc;
            padding: 20px;
            border-radius: 5px;
            background: #f9f9f9;
        }

        h2 {
            margin-top: 0;
            color: #333;
        }

        .autocomplete-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            display: inline-block;
        }

        #user-search {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        #autocomplete-list {
            position: absolute;
            border: 1px solid #d4d4d4;
            border-bottom: none;
            border-top: none;
            z-index: 99;
            top: 100%;
            left: 0;
            right: 0;
            margin: 0;
            padding: 0;
            list-style-type: none;
            background: white;
            max-height: 200px;
            overflow-y: auto;
        }

        #autocomplete-list li {
            padding: 10px;
            cursor: pointer;
            border-bottom: 1px solid #d4d4d4;
        }

        #autocomplete-list li:hover {
            background-color: #e9e9e9;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            background: white;
        }

        th,
        td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: left;
        }

        th {
            background-color: #f2f2f2;
        }

        .filter-section {
            margin-bottom: 15px;
        }

        select {
            padding: 8px;
            font-size: 16px;
            border-radius: 4px;
        }

        .delete-btn {
            color: white;
            background-color: #ff4d4f;
            border: none;
            padding: 8px 12px;
            cursor: pointer;
            border-radius: 4px;
        }

        .delete-btn:hover {
            background-color: #d9363e;
        }
    </style>
</head>

<body>

    <div class="section">
        <h2>1. User Search </h2>
        <div class="autocomplete-container">
            <input type="text" id="user-search" placeholder="Search Users by Username..." oninput="debounceSearch()"
                autocomplete="off">
            <ul id="autocomplete-list"></ul>
        </div>
        <p><small>search</small></p>
    </div>

    <div class="section">
        <h2>2. Student List</h2>
        <div class="filter-section">
            <label for="branch-filter">Filter by Branch: </label>
            <select id="branch-filter" onchange="renderStudents()">
                <option value="All">All Branches</option>
                <option value="CS">CS</option>
                <option value="IT">IT</option>
                <option value="ME">ME</option>
                <option value="EE">EE</option>
            </select>
        </div>

        <table id="student-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Branch</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="student-tbody">
            </tbody>
        </table>
    </div>

    <script>
        // 1. User Search Autocomplete Logic
        let timeoutId;

        function debounceSearch() {
            clearTimeout(timeoutId);
            timeoutId = setTimeout(searchUsers, 300);
        }

        async function searchUsers() {
            const input = document.getElementById('user-search').value;
            const list = document.getElementById('autocomplete-list');
            list.innerHTML = ""; // clear current list

            if (!input) return;

            try {
                // Calling API
                const response = await fetch(`/api/users?search=${encodeURIComponent(input)}`);
                const users = await response.json();

                users.forEach(user => {
                    const li = document.createElement('li');
                    li.innerHTML = `<strong>${user.Username}</strong> - <small>${user.FirstName} ${user.LastName}</small>`;
                    li.onclick = () => {
                        document.getElementById('user-search').value = user.Username;
                        list.innerHTML = '';
                    };
                    list.appendChild(li);
                });

                if (users.length === 0) {
                    const li = document.createElement('li');
                    li.textContent = "No users found.";
                    li.style.color = "grey";
                    li.style.cursor = "default";
                    list.appendChild(li);
                }
            } catch (err) {
                console.error("Error fetching users:", err);
            }
        }

        // Close autocomplete when clicking outside
        document.addEventListener("click", function (e) {
            if (e.target.id !== "user-search" && e.target.id !== "autocomplete-list") {
                document.getElementById('autocomplete-list').innerHTML = "";
            }
        });

        // 2. Student Table Logic
        let allStudents = [];

        // Fetching initial list of all students
        async function fetchStudents() {
            try {
                const res = await fetch('/api/students');
                allStudents = await res.json();
                renderStudents();
            } catch (err) {
                console.error("Error fetching students:", err);
            }
        }

        // Rendering  students based on filter
        function renderStudents() {
            const filter = document.getElementById('branch-filter').value;
            const tbody = document.getElementById('student-tbody');
            tbody.innerHTML = ""; // clear current rows

            const filtered = filter === "All"
                ? allStudents
                : allStudents.filter(s => s.branch === filter);

            // Build table rows
            filtered.forEach(student => {
                const tr = document.createElement('tr');

                const tdId = document.createElement('td');
                tdId.textContent = student.id;
                tr.appendChild(tdId);

                const tdName = document.createElement('td');
                tdName.textContent = student.name;
                tr.appendChild(tdName);

                const tdBranch = document.createElement('td');
                tdBranch.textContent = student.branch;
                tr.appendChild(tdBranch);

                // Action Column (Delete)
                const tdAction = document.createElement('td');
                const deleteBtn = document.createElement('button');
                deleteBtn.textContent = 'Delete';
                deleteBtn.className = 'delete-btn';
                deleteBtn.onclick = () => deleteStudent(student.id);
                tdAction.appendChild(deleteBtn);

                tr.appendChild(tdAction);
                tbody.appendChild(tr);
            });

            if (filtered.length === 0) {
                const tr = document.createElement('tr');
                const td = document.createElement('td');
                td.colSpan = 4;
                td.textContent = "No students found for this branch.";
                td.style.textAlign = "center";
                tr.appendChild(td);
                tbody.appendChild(tr);
            }
        }

        // Delete a student via API
        async function deleteStudent(id) {
            if (!confirm('Are you sure you want to delete this student record?')) return;

            try {
                const res = await fetch(`/api/students/${id}`, { method: 'DELETE' });
                const data = await res.json();

                if (data.success) {
                    allStudents = allStudents.filter(s => s.id !== id);
                    renderStudents(); // Re-render table
                } else {
                    alert(data.message || 'Failed to delete');
                }
            } catch (err) {
                console.error("Error deleting student:", err);
                alert("An error occurred while trying to delete.");
            }
        }

        // Call on page load
        fetchStudents();

    </script>

</body>

</html>
